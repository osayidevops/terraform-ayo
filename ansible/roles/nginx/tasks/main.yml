- name: Install nginx (latest stable)
  apt:
    name: nginx
    state: present
    update_cache: yes
  become: yes

- name: Ensure nginx service is enabled and running
  systemd:
    name: nginx
    state: started
    enabled: yes
  become: yes

- name: Allow HTTP through firewall (UFW)
  ufw:
    rule: allow
    port: '80'
    proto: tcp
  become: yes
